name: Release

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:

jobs:
  release:
    permissions:
      contents: write
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install dependencies
        run: npm ci

      - name: Read app version
        shell: pwsh
        run: |
          $package = Get-Content -Raw -LiteralPath "package.json" | ConvertFrom-Json
          $version = [string]$package.version

          if ($version -notmatch "^\d+\.\d+\.\d+$") {
            throw "Release version must be stable semver major.minor.patch: $version"
          }

          "APP_VERSION=$version" >> $env:GITHUB_ENV

      - name: Verify
        run: npm run verify

      - name: Build signed app
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npm run tauri -- build --ci

      - name: Prepare release assets
        shell: pwsh
        run: |
          $bundleDir = "src-tauri/target/release/bundle/nsis"
          $distDir = New-Item -ItemType Directory -Force -Path "artifacts/release"
          $installer = Get-ChildItem -LiteralPath $bundleDir -Filter "Torch Overlay_*_x64-setup.exe" |
            Sort-Object LastWriteTime -Descending |
            Select-Object -First 1

          if (-not $installer) {
            throw "Installer was not found under $bundleDir"
          }

          $signaturePath = "$($installer.FullName).sig"
          if (-not (Test-Path -LiteralPath $signaturePath)) {
            throw "Updater signature was not generated: $signaturePath"
          }

          $assetInstallerName = $installer.Name -replace "\s+", "."
          $assetInstallerPath = Join-Path $distDir.FullName $assetInstallerName
          $assetSignaturePath = "$assetInstallerPath.sig"

          Copy-Item -LiteralPath $installer.FullName -Destination $assetInstallerPath -Force
          Copy-Item -LiteralPath $signaturePath -Destination $assetSignaturePath -Force

          $tag = "v$env:APP_VERSION"
          $encodedInstallerName = [uri]::EscapeDataString($assetInstallerName)
          $installerUrl = "https://github.com/$env:GITHUB_REPOSITORY/releases/download/$tag/$encodedInstallerName"
          $signature = (Get-Content -LiteralPath $assetSignaturePath -Raw).Trim()
          $platform = [ordered]@{
            signature = $signature
            url = $installerUrl
          }
          $latest = [ordered]@{
            version = $env:APP_VERSION
            notes = "Torch Overlay release $env:APP_VERSION."
            pub_date = (Get-Date).ToUniversalTime().ToString("yyyy-MM-ddTHH:mm:ssZ")
            platforms = [ordered]@{
              "windows-x86_64-nsis" = $platform
              "windows-x86_64" = $platform
            }
          }

          $utf8NoBom = [System.Text.UTF8Encoding]::new($false)
          [System.IO.File]::WriteAllText(
            (Join-Path $distDir.FullName "latest.json"),
            ($latest | ConvertTo-Json -Depth 10),
            $utf8NoBom
          )

      - name: Publish release
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag = "v$env:APP_VERSION"
          $assets = Get-ChildItem -LiteralPath "artifacts/release" -File | ForEach-Object { $_.FullName }

          gh release view $tag *> $null
          $releaseExists = $LASTEXITCODE -eq 0

          if ($releaseExists) {
            gh release edit $tag --title "Torch Overlay $env:APP_VERSION" --notes "Release $env:APP_VERSION." --latest
            gh release upload $tag @assets --clobber
          } else {
            gh release create $tag @assets --title "Torch Overlay $env:APP_VERSION" --notes "Release $env:APP_VERSION." --target $env:GITHUB_SHA --latest
          }
